<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcX — Modern Calculator</title>
    <meta name="description" content="A beautiful, modern calculator with scientific functions powered by Flask">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <rect x="2" y="2" width="20" height="20" rx="6" stroke="currentColor" stroke-width="2"/>
                        <line x1="7" y1="12" x2="17" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="12" y1="7" x2="12" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="logo-text">Calc<span class="logo-accent">X</span></span>
            </div>
            <div class="mode-toggle" id="modeToggle">
                <button class="mode-btn active" data-mode="standard" id="btnStandard">Standard</button>
                <button class="mode-btn" data-mode="scientific" id="btnScientific">Scientific</button>
                <div class="mode-slider"></div>
            </div>
        </header>

        <!-- Calculator -->
        <main class="calculator" id="calculator">
            <!-- Display -->
            <div class="display-container">
                <div class="history-panel" id="historyPanel">
                    <div class="history-header">
                        <span>History</span>
                        <button class="history-clear" id="clearHistory" title="Clear history">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3,6 5,6 21,6"/>
                                <path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"/>
                            </svg>
                        </button>
                    </div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">No calculations yet</div>
                    </div>
                </div>

                <div class="display" id="display">
                    <div class="expression" id="expression"></div>
                    <div class="result" id="result">0</div>
                </div>
            </div>

            <!-- Scientific Panel -->
            <div class="scientific-panel hidden" id="scientificPanel">
                <div class="sci-grid">
                    <button class="btn btn-sci" data-sci="sin" id="btnSin">sin</button>
                    <button class="btn btn-sci" data-sci="cos" id="btnCos">cos</button>
                    <button class="btn btn-sci" data-sci="tan" id="btnTan">tan</button>
                    <button class="btn btn-sci" data-sci="log" id="btnLog">log</button>
                    <button class="btn btn-sci" data-sci="ln" id="btnLn">ln</button>
                    <button class="btn btn-sci" data-sci="sqrt" id="btnSqrt">√</button>
                    <button class="btn btn-sci" data-sci="square" id="btnSquare">x²</button>
                    <button class="btn btn-sci" data-sci="cube" id="btnCube">x³</button>
                    <button class="btn btn-sci" data-sci="factorial" id="btnFactorial">x!</button>
                    <button class="btn btn-sci" data-sci="inv" id="btnInv">1/x</button>
                    <button class="btn btn-sci" data-sci="pi" id="btnPi">π</button>
                    <button class="btn btn-sci" data-sci="e" id="btnE">e</button>
                    <button class="btn btn-sci" data-sci="pow10" id="btnPow10">10ˣ</button>
                    <button class="btn btn-sci" data-sci="exp" id="btnExp">eˣ</button>
                    <button class="btn btn-sci" data-sci="abs" id="btnAbs">|x|</button>
                </div>
            </div>

            <!-- Standard Buttons -->
            <div class="btn-grid">
                <button class="btn btn-func" id="btnClear" data-action="clear">AC</button>
                <button class="btn btn-func" id="btnParenOpen" data-action="paren-open">(</button>
                <button class="btn btn-func" id="btnParenClose" data-action="paren-close">)</button>
                <button class="btn btn-op" id="btnDivide" data-action="operator" data-value="÷">÷</button>

                <button class="btn btn-num" data-action="number" data-value="7" id="btn7">7</button>
                <button class="btn btn-num" data-action="number" data-value="8" id="btn8">8</button>
                <button class="btn btn-num" data-action="number" data-value="9" id="btn9">9</button>
                <button class="btn btn-op" id="btnMultiply" data-action="operator" data-value="×">×</button>

                <button class="btn btn-num" data-action="number" data-value="4" id="btn4">4</button>
                <button class="btn btn-num" data-action="number" data-value="5" id="btn5">5</button>
                <button class="btn btn-num" data-action="number" data-value="6" id="btn6">6</button>
                <button class="btn btn-op" id="btnSubtract" data-action="operator" data-value="−">−</button>

                <button class="btn btn-num" data-action="number" data-value="1" id="btn1">1</button>
                <button class="btn btn-num" data-action="number" data-value="2" id="btn2">2</button>
                <button class="btn btn-num" data-action="number" data-value="3" id="btn3">3</button>
                <button class="btn btn-op" id="btnAdd" data-action="operator" data-value="+">+</button>

                <button class="btn btn-num" data-action="negate" id="btnNegate">±</button>
                <button class="btn btn-num" data-action="number" data-value="0" id="btn0">0</button>
                <button class="btn btn-num" data-action="decimal" id="btnDecimal">.</button>
                <button class="btn btn-equals" data-action="equals" id="btnEquals">=</button>
            </div>

            <!-- Bottom bar -->
            <div class="bottom-bar">
                <button class="icon-btn" id="btnBackspace" data-action="backspace" title="Backspace">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                        <line x1="18" y1="9" x2="12" y2="15"/>
                        <line x1="12" y1="9" x2="18" y2="15"/>
                    </svg>
                </button>
                <button class="icon-btn" id="btnHistory" title="History">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span>Powered by Flask & Python</span>
        </footer>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
